<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>大乐透开奖数据提交</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }
    .card {
      background: rgba(255,255,255,0.95);
      border-radius: 20px;
      padding: 28px 24px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    }
    h1 {
      text-align: center;
      font-size: 20px;
      color: #1a1a2e;
      margin-bottom: 6px;
    }
    .subtitle {
      text-align: center;
      font-size: 13px;
      color: #666;
      margin-bottom: 24px;
    }
    .form-group { margin-bottom: 18px; }
    label {
      display: block;
      font-size: 14px;
      font-weight: 600;
      color: #333;
      margin-bottom: 6px;
    }
    .hint {
      font-size: 12px;
      color: #999;
      font-weight: normal;
    }
    input {
      width: 100%;
      padding: 12px 14px;
      border: 2px solid #e0e0e0;
      border-radius: 10px;
      font-size: 18px;
      font-weight: bold;
      text-align: center;
      transition: border-color 0.2s;
      outline: none;
      letter-spacing: 2px;
    }
    input:focus { border-color: #4a90d9; }
    input::placeholder { color: #ccc; font-weight: normal; letter-spacing: 0; }
    .row {
      display: flex;
      gap: 10px;
    }
    .row .form-group { flex: 1; }

    /* 前区5个号 */
    .front-inputs { display: flex; gap: 6px; }
    .front-inputs input {
      flex: 1;
      padding: 10px 4px;
      font-size: 16px;
      aspect-ratio: 1;
      border-radius: 8px;
    }
    /* 后区2个号 */
    .back-inputs { display: flex; gap: 10px; }
    .back-inputs input {
      flex: 1;
      padding: 10px 4px;
      font-size: 16px;
      aspect-ratio: 1.3;
      border-radius: 8px;
    }

    .section-label {
      display: inline-block;
      font-size: 11px;
      color: #fff;
      background: #e74c3c;
      padding: 2px 8px;
      border-radius: 4px;
      margin-bottom: 6px;
      font-weight: 600;
    }
    .section-label.blue {
      background: #3498db;
    }

    .btn-submit {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #e74c3c, #c0392b);
      color: #fff;
      border: none;
      border-radius: 12px;
      font-size: 17px;
      font-weight: 700;
      cursor: pointer;
      margin-top: 8px;
      transition: transform 0.1s, box-shadow 0.2s;
    }
    .btn-submit:active {
      transform: scale(0.97);
    }
    .btn-submit:hover {
      box-shadow: 0 6px 20px rgba(231,76,60,0.4);
    }

    .footer {
      text-align: center;
      margin-top: 18px;
      font-size: 11px;
      color: #aaa;
    }
    .footer a { color: #4a90d9; text-decoration: none; }

    /* 号码示例提示 */
    .example {
      background: #f8f9fa;
      border-radius: 8px;
      padding: 8px 12px;
      margin-top: 6px;
      font-size: 12px;
      color: #888;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>🎯 大乐透开奖数据</h1>
    <p class="subtitle">填写最新一期开奖号码，提交后自动更新预测系统</p>

    <div class="form-group">
      <label>期号 <span class="hint">（如 26068）</span></label>
      <input type="text" id="issue" placeholder="26068" maxlength="7" autocomplete="off">
    </div>

    <div class="form-group">
      <span class="section-label">前区（5个号码）</span>
      <label class="hint">01-35，不重复</label>
      <div class="front-inputs" id="frontInputs">
        <input type="number" min="1" max="35" placeholder="--" data-idx="0">
        <input type="number" min="1" max="35" placeholder="--" data-idx="1">
        <input type="number" min="1" max="35" placeholder="--" data-idx="2">
        <input type="number" min="1" max="35" placeholder="--" data-idx="3">
        <input type="number" min="1" max="35" placeholder="--" data-idx="4">
      </div>
    </div>

    <div class="form-group">
      <span class="section-label blue">后区（2个号码）</span>
      <label class="hint">01-12，不重复</label>
      <div class="back-inputs" id="backInputs">
        <input type="number" min="1" max="12" placeholder="--" data-idx="0">
        <input type="number" min="1" max="12" placeholder="--" data-idx="1">
      </div>
    </div>

    <button class="btn-submit" onclick="submitData()">提交开奖号码</button>

    <p class="footer">
      提交后将在 GitHub 创建 Issue，系统自动处理 ·
      <a href="https://github.com/ShiHui1997/Wealth" target="_blank">查看仓库</a>
    </p>
  </div>

<script>
// 自动跳到下一个输入框（修复 number 类型在手机端的兼容性）
document.querySelectorAll('input').forEach(function(el) {
  el.addEventListener('input', function() {
    var val = this.value;
    // number 输入框：前区最多2位数(01-35)，后区最多2位数(01-12)
    var maxLen = 2;
    if (val.length >= maxLen) {
      var inputs = Array.from(document.querySelectorAll('input'));
      var idx = inputs.indexOf(this);
      if (idx < inputs.length - 1) inputs[idx + 1].focus();
    }
  });
});

function getValues(containerId, count) {
  var vals = [];
  for (var i = 0; i < count; i++) {
    var el = document.querySelector('#' + containerId + ' input[data-idx="' + i + '"]');
    var v = (el && el.value) ? String(el.value).padStart(2, '0') : '';
    vals.push(v);
  }
  return vals;
}

function submitData() {
  var btn = document.querySelector('.btn-submit');
  var issue = document.getElementById('issue').value.trim();
  if (!issue) { alert('请输入期号'); return; }

  var front = getValues('frontInputs', 5);
  if (front.some(function(v){return !v;})) { alert('请填完前区5个号码'); return; }

  var back = getValues('backInputs', 2);
  if (back.some(function(v){return !v;})) { alert('请填完后区2个号码'); return; }

  // 构造 GitHub Issue 的标题和正文
  var title = '\u5F00\u5956\u63D0\u4EA4 ' + issue;

  // 用特殊格式标记，方便 Actions 解析
  // 格式：<!-- DLT_SUBMIT -->\n## 期号: xxx\n## 前区: xx xx xx xx xx\n## 后区: xx xx
  var body = '';
  body += '<!-- DLT_SUBMIT -->\n';
  body += '\n### \u26FA \u671F\u53F7: **' + issue + '**\n';
  body += '\n| \u533A\u57DF | \u53F7\u7801 |\n|---|---|\n';
  body += '| \u524D\u533A | ' + front.join(' ') + ' |\n';
  body += '| \u540E\u533A | ' + back.join(' ') + ' |\n';

  // 直接跳转到 GitHub Issue 创建页（window.open 在手机端/iframe 中会被拦截）
  var url = 'https://github.com/ShiHui1997/Wealth/issues/new'
    + '?title=' + encodeURIComponent(title)
    + '&body=' + encodeURIComponent(body);

  // 加视觉反馈
  btn.textContent = '⏳ 正在跳转...';
  btn.style.background = '#999';
  btn.disabled = true;

  window.location.href = url;
}
</script>
</body>
</html>
