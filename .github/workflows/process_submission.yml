name: 处理开奖数据提交

# 当用户通过手机提交 Issue 时自动触发
on:
  issues:
    types: [opened]
  workflow_dispatch:  # 也支持手动触发（用于测试）

permissions:
  contents: write
  issues: write

jobs:
  process-submission:
    runs-on: ubuntu-latest
    # 只处理包含开奖数据的 Issue（标题包含"开奖提交"）
    if: |
      (github.event_name == 'issues' && contains(github.event.issue.title, '开奖提交')) ||
      github.event_name == 'workflow_dispatch'
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 安装依赖
        run: pip install -r requirements.txt

      # ═══════════════════════════════════════════
      # 数据库缓存
      # ═══════════════════════════════════════════
      - name: 恢复数据库缓存
        id: cache-db
        uses: actions/cache@v4
        with:
          path: data/daletou.db
          key: daletou-db-${{ runner.os }}-py311-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            daletou-db-${{ runner.os }}-py311-

      - name: 缓存未命中时初始化数据库
        if: steps.cache-db.outputs.cache-hit != 'true'
        run: |
          echo "[缓存] 首次运行或缓存过期，从体彩API拉取全量数据..."
          python main.py init
          python main.py fetch-all
          echo "[缓存] 全量数据拉取完成"

      - name: 写入 PushPlus Token 到配置文件
        env:
          PUSHPLUS_TOKEN: ${{ secrets.PUSHPLUS_TOKEN }}
        run: python scripts/write_token.py "$PUSHPLUS_TOKEN"

      - name: 解析 Issue 并写入数据库
        env:
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: python scripts/parse_issue.py

      - name: 验证 + 校准 + 预测 + 推送
        run: python main.py run

      - name: 保存运行日志
        if: always()
        run: |
          mkdir -p logs
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add logs/ 2>/dev/null || true
          git diff --cached --quiet || {
            git commit -m "chore: 运行日志 from Issue $(date +%Y-%m-%d)"
            git push
          }
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 关闭 Issue 并评论结果
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUM: ${{ github.event.issue.number }}
        run: python scripts/close_issue.py
