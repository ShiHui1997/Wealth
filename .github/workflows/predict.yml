name: 大乐透智能预测推送

on:
  schedule:
    # 北京时间 每周一/三/六 19:30 = UTC 11:30
    - cron: "30 11 * * 1,3,6"
  workflow_dispatch:  # 支持手动触发

jobs:
  predict:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0  # 需要完整历史以提交数据更新

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 安装依赖
        run: pip install -r requirements.txt

      - name: 恢复数据库（从 repo 读取）
        run: |
          if [ -f data/daletou.db ]; then
            echo "数据库已存在，继续使用"
          else
            echo "首次运行，将创建新数据库"
          fi

      - name: 写入 PushPlus Token 到配置文件
        env:
          PUSHPLUS_TOKEN: ${{ secrets.PUSHPLUS_TOKEN }}
        run: |
          python -c "
          import yaml, os
          cfg_path = 'config/config.yaml'
          with open(cfg_path) as f:
              cfg = yaml.safe_load(f)
          cfg['pushplus']['token'] = os.environ['PUSHPLUS_TOKEN']
          with open(cfg_path, 'w') as f:
              yaml.dump(cfg, f, allow_unicode=True, sort_keys=False)
          print('PushPlus token 已写入配置')
          "

      - name: 完整运行（获取最新开奖 + 验证上期 + 校准 + 预测下期 + 推送）
        run: python main.py run

      - name: 提交更新的数据库和日志
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ logs/ 2>/dev/null || true
          git diff --cached --quiet || {
            git commit -m "chore: 更新开奖数据 + 预测记录 $(date +%Y-%m-%d)"
            git push
          }
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 打印校准状态（便于查看模型演化）
        run: python main.py stats
