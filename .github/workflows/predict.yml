name: 大乐透智能预测推送

on:
  schedule:
    # 北京时间 每周一/三/六 19:30 = UTC 11:30
    - cron: "30 11 * * 1,3,6"
  workflow_dispatch:  # 支持手动触发

permissions:
  contents: write
  issues: write

jobs:
  predict:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 安装依赖
        run: pip install -r requirements.txt

      # ═══════════════════════════════════════════
      # 数据库缓存（DB不纳入git，用Actions Cache持久化）
      # ═══════════════════════════════════════════
      - name: 恢复数据库缓存
        id: cache-db
        uses: actions/cache@v4
        with:
          path: data/daletou.db
          key: daletou-db-${{ github.run_id }}
          restore-keys: |
            daletou-db-

      - name: 缓存未命中时初始化数据库
        if: steps.cache-db.outputs.cache-hit != 'true'
        run: |
          echo "[缓存] 首次运行或缓存过期，从体彩API拉取全量数据..."
          python main.py init
          python main.py fetch-all
          echo "[缓存] 全量数据拉取完成"

      - name: 验证数据库可用
        run: |
          if [ -f data/daletou.db ]; then
            COUNT=$(python -c "import sqlite3; print(sqlite3.connect('data/daletou.db').execute('SELECT COUNT(*) FROM draws').fetchone()[0])")
            echo "[数据库] 当前 $COUNT 期数据"
            if [ "$COUNT" -lt 100 ]; then
              echo "[数据库] ⚠️ 数据不足100期，执行全量获取..."
              python main.py fetch-all
            fi
          else
            echo "[数据库] ❌ 数据库不存在，执行初始化..."
            python main.py init
            python main.py fetch-all
          fi

      - name: 写入 PushPlus Token 到配置文件
        env:
          PUSHPLUS_TOKEN: ${{ secrets.PUSHPLUS_TOKEN }}
        run: |
          python -c "
          import yaml, os
          cfg_path = 'config/config.yaml'
          with open(cfg_path) as f:
              cfg = yaml.safe_load(f)
          cfg['pushplus']['token'] = os.environ['PUSHPLUS_TOKEN']
          with open(cfg_path, 'w') as f:
              yaml.dump(cfg, f, allow_unicode=True, sort_keys=False)
          print('PushPlus token 已写入配置')
          "

      # ═══════════════════════════════════════════
      # 完整运行：获取+验证+校准+预测+推送
      # ═══════════════════════════════════════════
      - name: 完整运行（获取最新开奖 + 验证上期 + 校准 + 预测下期 + 推送）
        run: python main.py run
        continue-on-error: false

      # ═══════════════════════════════════════════
      # 后续步骤：保存日志 + 更新缓存 + 打印状态
      # ═══════════════════════════════════════════
      - name: 保存运行日志
        if: always()
        run: |
          mkdir -p logs
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add logs/ 2>/dev/null || true
          git diff --cached --quiet || {
            git commit -m "chore: 运行日志 $(date +%Y-%m-%d)"
            git push
          }
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 打印校准状态（便于查看模型演化）
        if: always()
        run: python main.py stats || true

      - name: 打印系统健康度
        if: always()
        run: python main.py health || true
