name: 大乐透智能预测推送

on:
  schedule:
    # 北京时间 每周一/三/六 19:30 = UTC 11:30
    - cron: "30 11 * * 1,3,6"
  workflow_dispatch:  # 支持手动触发

permissions:
  contents: write
  issues: write

jobs:
  predict:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 安装依赖
        run: pip install -r requirements.txt

      - name: 拉取最新代码（确保种子文件最新）
        run: git pull --rebase origin main || true

      # ═══════════════════════════════════════════
      # 数据库初始化（纯本地模式）
      # ═══════════════════════════════════════════
      - name: 恢复数据库缓存
        id: cache-db
        uses: actions/cache@v4
        with:
          path: data/daletou.db
          key: daletou-db-v2-${{ runner.os }}-py311-${{ hashFiles('data/seed_data.json') }}
          restore-keys: |
            daletou-db-v2-${{ runner.os }}-py311-

      - name: 初始化数据库（缓存未命中时从种子加载）
        if: steps.cache-db.outputs.cache-hit != 'true'
        run: |
          echo "[数据] 缓存未命中，从种子加载..."
          python main.py init && python main.py load-seed

      - name: 确认数据库就绪
        run: |
          if [ -f data/daletou.db ]; then
            RESULT=$(python -c "import sqlite3;c=sqlite3.connect('data/daletou.db');n=c.execute('SELECT COUNT(*) FROM draws').fetchone()[0];l=c.execute('SELECT issue FROM draws ORDER BY issue DESC LIMIT 1').fetchone();print(f'{n}|{l[0] if l else \"?\"}');c.close()")
            COUNT=$(echo "$RESULT" | cut -d'|' -f1)
            LATEST=$(echo "$RESULT" | cut -d'|' -f2)
            echo "✅ 数据库已就绪: ${COUNT} 期 (最新: ${LATEST})"
            if [ "$COUNT" -lt 10 ]; then
              echo "❌ 数据不足10期！"
              exit 1
            fi
          else
            echo "❌ 数据库不存在！"
            exit 1
          fi

      # ═══════════════════════════════════════════
      # 写入Token + 预检
      # ═══════════════════════════════════════════
      - name: 写入Token到config
        env:
          PUSHPLUS_TOKEN: ${{ secrets.PUSHPLUS_TOKEN }}
        run: |
          python scripts/write_token.py
          TOKEN_LEN=$(python -c "import yaml;cfg=yaml.safe_load(open('config/config.yaml'));print(len(cfg.get('pushplus',{}).get('token','')))")
          TOKEN_PREFIX=$(python -c "import yaml;cfg=yaml.safe_load(open('config/config.yaml'));t=cfg.get('pushplus',{}).get('token','');print(t[:6] if len(t)>=6 else t)")
          echo "✅ Token已写入: 长度=$TOKEN_LEN 前6位=$TOKEN_PREFIX"
          if [ "$TOKEN_LEN" -lt 10 ]; then
            echo "❌ Token过短！请检查Secrets中PUSHPLUS_TOKEN"
            exit 1
          fi

      - name: 推送通道预检（非阻塞）
        if: always()
        run: python scripts/precheck_push.py

      # ═══════════════════════════════════════════
      # 主运行（核心步骤）
      # ═══════════════════════════════════════════
      - name: 完整运行（验证 + 校准 + 预测 + 推送）
        id: main-run
        if: always()
        run: python main.py run

      # ═══════════════════════════════════════════
      # 后置验证与结果检查
      # ═══════════════════════════════════════════
      - name: 后置推送验证
        if: always()
        run: python scripts/postcheck_push.py || true

      - name: 检查推送结果
        if: always()
        run: python scripts/check_push_result.py

      - name: 打印校准状态
        if: always()
        run: python main.py stats || true

      - name: 打印系统健康度
        if: always()
        run: python main.py health || true

      # ═══════════════════════════════════════════
      # 保存缓存
      # ═══════════════════════════════════════════
      - name: Post 保存数据库缓存
        if: always()
        uses: actions/cache/save@v4
        with:
          path: data/daletou.db
          key: daletou-db-v2-${{ runner.os }}-py311-${{ hashFiles('data/seed_data.json') }}
