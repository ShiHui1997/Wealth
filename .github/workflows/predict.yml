name: 大乐透智能预测推送

on:
  schedule:
    # 北京时间 每周一/三/六 19:30 = UTC 11:30
    - cron: "30 11 * * 1,3,6"
  workflow_dispatch:  # 支持手动触发

permissions:
  contents: write
  issues: write

jobs:
  predict:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 安装依赖
        run: pip install -r requirements.txt

      # ═══════════════════════════════════════════
      # 数据库缓存（DB不纳入git，用Actions Cache持久化）
      # ═══════════════════════════════════════════
      - name: 恢复数据库缓存
        id: cache-db
        uses: actions/cache@v4
        with:
          path: data/daletou.db
          key: daletou-db-${{ runner.os }}-py311-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            daletou-db-${{ runner.os }}-py311-

      - name: 缓存未命中时初始化数据库
        if: steps.cache-db.outputs.cache-hit != 'true'
        run: |
          echo "[缓存] 首次运行或缓存过期，从体彩API拉取全量数据..."
          python main.py init
          python main.py fetch-all
          echo "[缓存] 全量数据拉取完成"

      - name: 验证数据库可用
        run: |
          if [ -f data/daletou.db ]; then
            COUNT=$(python -c "import sqlite3; print(sqlite3.connect('data/daletou.db').execute('SELECT COUNT(*) FROM draws').fetchone()[0])")
            echo "[数据库] 当前 $COUNT 期数据"
            if [ "$COUNT" -lt 100 ]; then
              echo "[数据库] ⚠️ 数据不足100期，执行全量获取..."
              python main.py fetch-all
            fi
          else
            echo "[数据库] ❌ 数据库不存在，执行初始化..."
            python main.py init
            python main.py fetch-all
          fi

      # ═══════════════════════════════════════════
      # 写入Token + 推送预检（一步完成，失败则终止）
      # ═══════════════════════════════════════════
      - name: 写入Token并验证推送通道
        env:
          PUSHPLUS_TOKEN: ${{ secrets.PUSHPLUS_TOKEN }}
        run: |
          echo "═══════════════════════════════════════"
          echo "  Token写入 + 推送通道预检"
          echo "═══════════════════════════════════════"

          # 1. 写入Token到config.yaml
          python scripts/write_token.py
          echo ""

          # 2. 验证config中的Token
          TOKEN_LEN=$(python -c "
          import yaml
          with open('config/config.yaml') as f:
              cfg = yaml.safe_load(f)
          t = cfg.get('pushplus', {}).get('token', '')
          print(len(t))
          ")
          echo "✅ config.yaml中Token长度: $TOKEN_LEN"

          if [ "$TOKEN_LEN" -lt 10 ]; then
              echo "❌ Token过短或为空！"
              exit 1
          fi

          # 3. 推送通道预检：发一条极简测试消息
          echo ""
          echo "[预检] 发送测试消息到PushPlus..."
          python -c "
          import json, urllib.request, ssl, os, yaml

          # 从config读取token（和主流程一致）
          with open('config/config.yaml') as f:
              cfg = yaml.safe_load(f)
          token = cfg.get('pushplus', {}).get('token', '')

          payload = {
              'token': token,
              'title': '🔧 预检测试 - 请忽略',
              'content': '<p>预测系统启动预检，如果你收到这条消息说明推送链路畅通 ✅</p>',
              'template': 'html',
          }
          ctx = ssl.create_default_context()
          req = urllib.request.Request(
              'https://www.pushplus.plus/send',
              data=json.dumps(payload).encode('utf-8'),
              headers={'Content-Type': 'application/json'},
              method='POST'
          )
          resp = urllib.request.urlopen(req, timeout=30, context=ctx)
          body = json.loads(resp.read().decode('utf-8'))
          print(f'API响应: {body}')
          if body.get('code') == 200:
              print('✅ 预检推送成功！（手机应收到「🔧 预检测试」消息）')
          else:
              print(f'❌ API返回错误: {body}')
              exit(1)
          "

          echo ""
          echo "═══════════════════════════════════════"

      # ═══════════════════════════════════════════
      # 主运行流程
      # ═══════════════════════════════════════════
      - name: 完整运行（获取最新开奖 + 验证上期 + 校准 + 预测下期 + 推送）
        id: main-run
        run: python main.py run

      # ═══════════════════════════════════════════
      # 后置推送验证（用与预检完全相同的代码路径）
      # 如果预检收到了但预测没收到，这条消息能帮助定位问题
      # ═══════════════════════════════════════════
      - name: 后置推送验证
        if: always()
        run: |
          echo "═══════════════════════════════════════"
          echo "  后置推送验证"
          echo "═══════════════════════════════════════"

          # 读取push_result.json（如果存在）
          if [ -f push_result.json ]; then
            python -c "
          import json
          with open('push_result.json') as f:
              r = json.load(f)
          print(f'  push_result.json: status={r.get(\"status\")} issue={r.get(\"issue\")} reason={r.get(\"reason\",\"\")})'
          "
          else
            echo "  ⚠️ push_result.json 不存在"
          fi

          echo ""
          echo "[后置验证] 发送确认消息到PushPlus..."
          python -c "
          import json, urllib.request, ssl, yaml

          with open('config/config.yaml') as f:
              cfg = yaml.safe_load(f)
          token = cfg.get('pushplus', {}).get('token', '')
          print(f'Token长度: {len(token)}')

          if not token:
              print('❌ Token为空！')
              exit(0)

          payload = {
              'token': token,
              'title': '✅ 后置验证 - Actions运行完成',
              'content': '''
          <p><b>GitHub Actions 运行完成</b></p>
          <p>如果你只收到这条消息而没收到预测消息，说明主运行流程中的推送环节有问题。</p>
          <p>请将此情况反馈给开发者。</p>
          <hr>
          <p style=\"color:#888;font-size:12px;\">时间: $(date -u '+%Y-%m-%d %H:%M:%S UTC')</p>
          ''',
              'template': 'html',
          }
          ctx = ssl.create_default_context()
          req = urllib.request.Request(
              'https://www.pushplus.plus/send',
              data=json.dumps(payload).encode('utf-8'),
              headers={'Content-Type': 'application/json'},
              method='POST'
          )
          resp = urllib.request.urlopen(req, timeout=30, context=ctx)
          body = json.loads(resp.read().decode('utf-8'))
          print(f'API响应: {body}')
          if body.get('code') == 200:
              print('✅ 后置验证推送成功！（手机应收到「✅ 后置验证」消息）')
          else:
              print(f'❌ API返回错误: {body}')
          "

          echo ""
          echo "═══════════════════════════════════════"

      # ═══════════════════════════════════════════
      # 后置检查
      # ═══════════════════════════════════════════
      - name: 检查推送结果
        if: always()
        run: |
          echo "═══════════════════════════════════════"
          echo "  推送结果最终检查"
          echo "═══════════════════════════════════════"
          if [ -f push_result.json ]; then
            python -c "
          import json
          with open('push_result.json') as f:
              r = json.load(f)
          status = r.get('status', 'unknown')
          issue = r.get('issue', '?')
          reason = r.get('reason', '')
          icons = {'success': '✅', 'failed': '❌'}
          print(f'  推送状态: {icons.get(status, \"⚠️\")} {status}')
          print(f'  预测期号: {issue}')
          if reason:
              print(f'  失败原因: {reason}')
          "
            echo "═══════════════════════════════════════"
          else
            echo "  ⚠️ push_result.json 不存在"
            echo "  可能原因："
            echo "    1. 数据不足10期 → cmd_predict提前退出"
            echo "    2. 运行过程中发生未捕获异常"
            echo "    3. --no-push 被指定"
            echo "═══════════════════════════════════════"
          fi

      - name: 打印校准状态
        if: always()
        run: python main.py stats || true

      - name: 打印系统健康度
        if: always()
        run: python main.py health || true
