name: 大乐透智能预测推送

on:
  schedule:
    # 北京时间 每周一/三/六 19:30 = UTC 11:30
    - cron: "30 11 * * 1,3,6"
  workflow_dispatch:  # 支持手动触发

permissions:
  contents: write
  issues: write

jobs:
  predict:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 安装依赖
        run: pip install -r requirements.txt

      # ═══════════════════════════════════════════
      # 数据库缓存（DB不纳入git，用Actions Cache持久化）
      # ═══════════════════════════════════════════
      - name: 恢复数据库缓存
        id: cache-db
        uses: actions/cache@v4
        with:
          path: data/daletou.db
          key: daletou-db-${{ runner.os }}-py311-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            daletou-db-${{ runner.os }}-py311-

      - name: 缓存未命中时初始化数据库
        if: steps.cache-db.outputs.cache-hit != 'true'
        run: |
          echo "[缓存] 首次运行或缓存过期，从体彩API拉取全量数据..."
          python main.py init
          python main.py fetch-all
          echo "[缓存] 全量数据拉取完成"

      - name: 验证数据库可用
        run: |
          if [ -f data/daletou.db ]; then
            COUNT=$(python -c "import sqlite3; print(sqlite3.connect('data/daletou.db').execute('SELECT COUNT(*) FROM draws').fetchone()[0])")
            echo "[数据库] 当前 $COUNT 期数据"
            if [ "$COUNT" -lt 100 ]; then
              echo "[数据库] ⚠️ 数据不足100期，执行全量获取..."
              python main.py fetch-all
            fi
          else
            echo "[数据库] ❌ 数据库不存在，执行初始化..."
            python main.py init
            python main.py fetch-all
          fi

      # ═══════════════════════════════════════════
      # 步骤A：写入Token（必须成功）
      # ═══════════════════════════════════════════
      - name: 写入Token到config
        env:
          PUSHPLUS_TOKEN: ${{ secrets.PUSHPLUS_TOKEN }}
        run: |
          python scripts/write_token.py
          TOKEN_LEN=$(python -c "
          import yaml
          with open('config/config.yaml') as f:
              cfg = yaml.safe_load(f)
          print(len(cfg.get('pushplus', {}).get('token', '')))
          ")
          echo "✅ Token已写入，长度: $TOKEN_LEN"
          if [ "$TOKEN_LEN" -lt 10 ]; then
            echo "❌ Token过短！"
            exit 1
          fi

      # ═══════════════════════════════════════════
      # 步骤B：推送预检（尽力而为，不阻断主流程）
      # code=999 反垃圾 → 警告但继续（主流程内容不同不会被拦）
      # 真正的网络错误/token错误 → 也只警告，不阻断
      # 预检只是辅助诊断，预测才是核心任务
      # ═══════════════════════════════════════════
      - name: 推送通道预检（非阻塞）
        if: always()
        run: |
          echo "═══════════════════════════════════════"
          echo "  推送预检（失败不阻断主流程）"
          echo "═══════════════════════════════════════"

          python -c "
          import json, urllib.request, ssl, os, yaml
          from datetime import datetime, timezone, timedelta

          with open('config/config.yaml') as f:
              cfg = yaml.safe_load(f)
          token = cfg.get('pushplus', {}).get('token', '')

          # 带时间戳+Run ID确保每次内容唯一（避免PushPlus反垃圾code=999）
          bj = datetime.now(timezone(timedelta(hours=8)))
          ts = bj.strftime('%m-%d %H:%M')
          rid = os.environ.get('GITHUB_RUN_ID', '?')

          payload = {
              'token': token,
              'title': f'🔧 预检 {ts} #{rid}',
              'content': f'<p>预检通过 ✅ | Run #{rid} | {ts}</p>',
              'template': 'html',
          }

          try:
              ctx = ssl.create_default_context()
              req = urllib.request.Request(
                  'https://www.pushplus.plus/send',
                  data=json.dumps(payload).encode('utf-8'),
                  headers={'Content-Type': 'application/json'},
                  method='POST'
              )
              resp = urllib.request.urlopen(req, timeout=30, context=ctx)
              body = json.loads(resp.read().decode('utf-8'))
              code = body.get('code', -1)

              if code == 200:
                  print(f'✅ 预检成功: {body.get(\"msg\", \"\")}')
              elif code == 999:
                  print(f'⚠️ 预检被反垃圾拦截(code=999): {body.get(\"msg\", \"\")}')
                  print('   原因：短时间内推送了相似内容')
                  print('   ⚠️  不影响主流程！预测消息内容不同，可正常发送')
              else:
                  print(f'⚠️ API返回异常(code={code}): {body}')
                  print('   ⚠️  不阻断主流程，继续执行预测...')
          except Exception as e:
              print(f'⚠️ 预检请求异常: {type(e).__name__}: {e}')
              print('   ⚠️  不阻断主流程，继续执行预测...')

          print('')
          print('═══════════════════════════════════════')
          "

      # ═══════════════════════════════════════════
      # 主运行流程（核心步骤，无论预检结果都执行）
      # ═══════════════════════════════════════════
      - name: 完整运行（获取最新开奖 + 验证上期 + 校准 + 预测下期 + 推送）
        id: main-run
        if: always()  # 无论预检是否成功都执行
        run: python main.py run

      # ═══════════════════════════════════════════
      # 后置推送验证（用与预检完全相同的代码路径）
      # 如果预检收到了但预测没收到，这条消息能帮助定位问题
      # ═══════════════════════════════════════════
      - name: 后置推送验证
        if: always()
        run: |
          echo "═══════════════════════════════════════"
          echo "  后置推送验证"
          echo "═══════════════════════════════════════"

          # 读取push_result.json（如果存在）
          if [ -f push_result.json ]; then
            python -c "
          import json
          with open('push_result.json') as f:
              r = json.load(f)
          print(f'  push_result.json: status={r.get(\"status\")} issue={r.get(\"issue\")} reason={r.get(\"reason\",\"\")})'
          "
          else
            echo "  ⚠️ push_result.json 不存在"
          fi

          echo ""
          echo "[后置验证] 发送确认消息到PushPlus..."
          python -c "
          import json, urllib.request, ssl, yaml

          with open('config/config.yaml') as f:
              cfg = yaml.safe_load(f)
          token = cfg.get('pushplus', {}).get('token', '')
          print(f'Token长度: {len(token)}')

          if not token:
              print('❌ Token为空！')
              exit(0)

          payload = {
              'token': token,
              'title': '✅ 后置验证 - Actions运行完成',
              'content': '''
          <p><b>GitHub Actions 运行完成</b></p>
          <p>如果你只收到这条消息而没收到预测消息，说明主运行流程中的推送环节有问题。</p>
          <p>请将此情况反馈给开发者。</p>
          <hr>
          <p style=\"color:#888;font-size:12px;\">时间: $(date -u '+%Y-%m-%d %H:%M:%S UTC')</p>
          ''',
              'template': 'html',
          }
          ctx = ssl.create_default_context()
          req = urllib.request.Request(
              'https://www.pushplus.plus/send',
              data=json.dumps(payload).encode('utf-8'),
              headers={'Content-Type': 'application/json'},
              method='POST'
          )
          resp = urllib.request.urlopen(req, timeout=30, context=ctx)
          body = json.loads(resp.read().decode('utf-8'))
          print(f'API响应: {body}')
          if body.get('code') == 200:
              print('✅ 后置验证推送成功！（手机应收到「✅ 后置验证」消息）')
          else:
              print(f'❌ API返回错误: {body}')
          "

          echo ""
          echo "═══════════════════════════════════════"

      # ═══════════════════════════════════════════
      # 后置检查
      # ═══════════════════════════════════════════
      - name: 检查推送结果
        if: always()
        run: |
          echo "═══════════════════════════════════════"
          echo "  推送结果最终检查 + 诊断信息"
          echo "═══════════════════════════════════════"

          # 1. 显示诊断文件（追踪 cmd_predict 执行到了哪里）
          if [ -f predict_diagnostic.json ]; then
            echo ""
            echo "📋 predict_diagnostic.json（执行路径追踪）:"
            python -c "
          import json
          with open('predict_diagnostic.json') as f:
              d = json.load(f)
          for k, v in d.items():
              if not k.startswith('_'):
                  print(f'    {k}: {v}')
          "
          else
            echo ""
            echo "  ⚠️ predict_diagnostic.json 不存在 → cmd_predict 可能未被调用"
          fi

          # 2. 显示推送结果
          if [ -f push_result.json ]; then
            echo ""
            echo "📋 push_result.json:"
            python -c "
          import json, sys
          with open('push_result.json') as f:
              r = json.load(f)
          status = r.get('status', 'unknown')
          issue = r.get('issue', '?')
          reason = r.get('reason', '')
          error_type = r.get('error_type', '')
          detail = r.get('error_detail', '')
          api_resp = r.get('api_response', {})
          icons = {'success': '✅', 'failed': '❌'}
          print(f'  推送状态: {icons.get(status, \"⚠️\")} {status}')
          print(f'  预测期号: {issue}')
          if reason:
              print(f'  失败原因: {reason}')
          if error_type:
              print(f'  异常类型: {error_type}')
          if detail:
              print(f'  详细信息: {detail[:300]}')
          if api_resp:
              print(f'  API响应: {api_resp}')

          if status != 'success':
              print('')
              print('  ⛔ 推送未成功！此步骤将以失败状态退出')
              sys.exit(1)
          "
          else
            echo ""
            echo "  ⚠️ push_result.json 不存在"
            echo "  → cmd_predict 的推送代码路径未执行到"
            echo ""
            echo "  请查看上方 predict_diagnostic.json 确认执行断点"
            echo "::error::push_result.json 不存在 - 推送代码未执行"
          fi

          echo ""
          echo "═══════════════════════════════════════"

      - name: 打印校准状态
        if: always()
        run: python main.py stats || true

      - name: 打印系统健康度
        if: always()
        run: python main.py health || true
